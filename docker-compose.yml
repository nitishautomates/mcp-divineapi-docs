version: "3.8"

services:
  docs-mcp:
    build: .
    ports:
      - "8004:8000"
    environment:
      - MCP_TRANSPORT=http
      - MCP_HOST=${MCP_HOST:-mcp.divineapi.com}
      # DivineAPI credentials (provide via .env). Used as env fallback / gate.
      - DIVINE_API_KEY=${DIVINE_API_KEY:-}
      - DIVINE_AUTH_TOKEN=${DIVINE_AUTH_TOKEN:-}
      # Stable secret that signs the OAuth/JWT tokens; keep it constant across
      # restarts so issued tokens survive a rebuild (set in .env on the VPS).
      - MCP_JWT_SECRET=${MCP_JWT_SECRET:-}
    restart: unless-stopped
